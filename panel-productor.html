<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Área productor - EcoMarket</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/panel-productor.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-page="panel-productor">

<div id="header-placeholder"></div>

<main class="producer-page">
    <section class="producer-shell">

        <header class="producer-head">
            <div>
                <h1>Área de productor</h1>
                <p>Desde aquí puedes gestionar los productos que tienes en venta en EcoMarket.</p>
            </div>

            <div class="producer-user">
        <span class="pill">
          <i class="fa-solid fa-user"></i>
          <strong id="producerName">Productor</strong>
        </span>
                <button class="btn btn-secondary" id="logoutBtn" type="button">Cerrar sesión</button>
            </div>
        </header>

        <section class="producer-card">
            <h2>Añadir producto</h2>

            <form id="productForm" class="producer-form">
                <div class="field">
                    <label for="pName">Nombre</label>
                    <input id="pName" type="text" placeholder="Ej. Tomates de rama" required />
                </div>

                <div class="field">
                    <label for="pOrigin">Origen</label>
                    <input id="pOrigin" type="text" placeholder="Ej. Gran Canaria" required />
                </div>

                <div class="field">
                    <label for="pPrice">Precio (€)</label>
                    <input id="pPrice" type="number" min="0" step="0.01" placeholder="Ej. 3.10" required />
                </div>

                <div class="field">
                    <label for="pUnit">Unidad de precio</label>
                    <select id="pUnit" required>
                        <option value="€/kg">€/kg</option>
                        <option value="€/unidad">€/unidad</option>
                        <option value="€/l">€/l</option>
                        <option value="€/pack">€/pack</option>
                    </select>
                </div>

                <div class="field full">
                    <label for="pImage">Imagen del producto</label>
                    <input id="pImage" type="file" accept="image/*" />
                    <small>Opcional. Si no subes imagen, se usará un placeholder.</small>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">
                        <i class="fa-solid fa-plus"></i>
                        Añadir producto
                    </button>
                </div>
            </form>
        </section>

        <section class="producer-card">
            <div class="table-head">
                <h2>Mis productos en venta</h2>
                <div class="table-tools">
                    <input id="searchInput" class="search" type="search" placeholder="Buscar por nombre..." />
                </div>
            </div>

            <div class="table-wrap">
                <table class="producer-table">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Origen</th>
                        <th>Precio</th>
                        <th class="th-actions">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="productsTbody"></tbody>
                </table>
            </div>
        </section>

    </section>
</main>

<div id="footer-placeholder"></div>

<script>
    function getSession() {
        try { return JSON.parse(localStorage.getItem("ecomarket_session")); }
        catch { return null; }
    }

    function requireProducer() {
        const session = getSession();
        if (!session || session.rol !== "productor") {
            window.location.href = "login.html";
            return null;
        }
        return session;
    }

    async function fetchProducts(ownerId) {
        try {
            const res = await fetch(`http://localhost:3000/productos?ownerId=${ownerId}`);
            if (!res.ok) throw new Error("Error en servidor");
            return await res.json();
        } catch(e) {
            console.error(e);
            return [];
        }
    }

    function formatPrice(value) {
        const num = Number(value);
        if (Number.isNaN(num)) return value;
        return num.toFixed(2).replace(".", ",");
    }

    function createRow(item) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
      <td class="td-name">
        <div class="row-main">
          <img class="thumb" src="${item.image || 'Imagenes/placeholder-producto.jpg'}" alt="">
          <div>
            <strong>${item.name}</strong>
            <div class="muted">ID: ${item.id ? item.id.toString().slice(0, 8) : ''}</div>
          </div>
        </div>
      </td>
      <td>${item.origin}</td>
      <td><strong>${formatPrice(item.price)}</strong> <span class="muted">${item.unit}</span></td>
      <td class="td-actions">
        <button class="btn-mini btn-edit" data-id="${item.id}">Editar</button>
        <button class="btn-mini btn-danger" data-id="${item.id}">Eliminar</button>
      </td>
    `;
        return tr;
    }

    function renderTable(items) {
        const tbody = document.getElementById("productsTbody");
        tbody.innerHTML = "";

        if (!items.length) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td colspan="4" class="empty">Aún no has añadido productos.</td>`;
            tbody.appendChild(tr);
            return;
        }

        items.forEach(p => tbody.appendChild(createRow(p)));
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const session = requireProducer();
        if (!session) return;

        document.getElementById("producerName").textContent = session.name || "Productor";

        const ownerId = session.id;
        
        // Cargar desde json-server buscando solo los del owner actual
        let products = await fetchProducts(ownerId);
        renderTable(products);

        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("ecomarket_session");
            window.location.href = "index.html";
        });

        document.getElementById("searchInput").addEventListener("input", (e) => {
            const q = e.target.value.toLowerCase().trim();
            const filtered = products.filter(p => p.name.toLowerCase().includes(q));
            renderTable(filtered);
        });

        document.getElementById("productForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("pName").value.trim();
            const origin = document.getElementById("pOrigin").value.trim();
            const price = document.getElementById("pPrice").value;
            const unit = document.getElementById("pUnit").value;
            const file = document.getElementById("pImage").files[0];

            let imageUrl = "";

            if (file) {
                imageUrl = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const item = { 
                ownerId, // Sólo añade sus propios productos
                ownerName: session.name, // Para uso opcional en catálogo
                name, 
                origin, 
                price: Number(price), 
                unit, 
                image: imageUrl 
            };

            try {
                const res = await fetch("http://localhost:3000/productos", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(item)
                });
                
                if (res.ok) {
                    const newItem = await res.json();
                    products.unshift(newItem);
                    renderTable(products);
                    e.target.reset();
                } else {
                    alert("No se pudo añadir el producto");
                }
            } catch(e) {
                alert("Error de red conectando al servidor JSON.");
            }
        });

        document.getElementById("productsTbody").addEventListener("click", async (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;

            const id = btn.dataset.id;
            if (!id) return;

            if (btn.classList.contains("btn-danger")) {
                if(!confirm("¿Estás seguro de que quieres borrar este producto permanentemente?")) return;
                
                try {
                    const res = await fetch(`http://localhost:3000/productos/${id}`, { method: "DELETE" });
                    if(res.ok) {
                        products = products.filter(p => String(p.id) !== String(id));
                        renderTable(products);
                    } else {
                        alert("No pudimos borrar el producto en el servidor.");
                    }
                } catch(e) {
                    alert("Error de red");
                }
                return;
            }

            if (btn.classList.contains("btn-edit")) {
                const item = products.find(p => String(p.id) === String(id));
                if (!item) return;

                const newName = prompt("Editar nombre:", item.name);
                if (newName === null) return;

                const newPrice = prompt("Editar precio (ej. 3.10):", String(item.price));
                if (newPrice === null) return;

                const patchData = {
                    name: newName.trim() || item.name,
                    price: Number(newPrice) || item.price
                };

                try {
                    const res = await fetch(`http://localhost:3000/productos/${id}`, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(patchData)
                    });
                    
                    if (res.ok) {
                        const updatedItem = await res.json();
                        const index = products.findIndex(p => String(p.id) === String(id));
                        products[index] = updatedItem;
                        renderTable(products);
                    } else {
                        alert("Fallo al actualizar el producto en el servidor");
                    }
                } catch(e) {
                    alert("Error de red");
                }
            }
        });
    });
</script>

<script src="js/layout.js"></script>

</body>
</html>
