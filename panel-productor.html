<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Área productor - EcoMarket</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/panel-productor.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-page="panel-productor">

<div id="header-placeholder"></div>

<main class="producer-page">
    <section class="producer-shell">

        <header class="producer-head">
            <div>
                <h1>Área de productor</h1>
                <p>Desde aquí puedes gestionar los productos que tienes en venta en EcoMarket.</p>
            </div>

            <div class="producer-user">
        <span class="pill">
          <i class="fa-solid fa-user"></i>
          <strong id="producerName">Productor</strong>
        </span>
                <button class="btn btn-secondary" id="logoutBtn" type="button">Cerrar sesión</button>
            </div>
        </header>

        <section class="producer-card">
            <h2>Añadir producto</h2>

            <form id="productForm" class="producer-form">
                <div class="field">
                    <label for="pName">Nombre</label>
                    <input id="pName" type="text" placeholder="Ej. Tomates de rama" required />
                </div>

                <div class="field">
                    <label for="pOrigin">Origen</label>
                    <input id="pOrigin" type="text" placeholder="Ej. Gran Canaria" required />
                </div>

                <div class="field">
                    <label for="pPrice">Precio (€)</label>
                    <input id="pPrice" type="number" min="0" step="0.01" placeholder="Ej. 3.10" required />
                </div>

                <div class="field">
                    <label for="pUnit">Unidad de precio</label>
                    <select id="pUnit" required>
                        <option value="€/kg">€/kg</option>
                        <option value="€/unidad">€/unidad</option>
                        <option value="€/l">€/l</option>
                        <option value="€/pack">€/pack</option>
                    </select>
                </div>

                <div class="field full">
                    <label for="pImage">Imagen del producto</label>
                    <input id="pImage" type="file" accept="image/*" />
                    <small>Opcional. Si no subes imagen, se usará un placeholder.</small>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">
                        <i class="fa-solid fa-plus"></i>
                        Añadir producto
                    </button>
                </div>
            </form>
        </section>

        <section class="producer-card">
            <div class="table-head">
                <h2>Mis productos en venta</h2>
                <div class="table-tools">
                    <input id="searchInput" class="search" type="search" placeholder="Buscar por nombre..." />
                </div>
            </div>

            <div class="table-wrap">
                <table class="producer-table">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Origen</th>
                        <th>Precio</th>
                        <th class="th-actions">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="productsTbody"></tbody>
                </table>
            </div>
        </section>

    </section>
</main>

<div id="footer-placeholder"></div>

<script>
    function getSession() {
        try { return JSON.parse(localStorage.getItem("ecomarket_session")); }
        catch { return null; }
    }

    function requireProducer() {
        const session = getSession();
        if (!session || session.rol !== "productor") {
            window.location.href = "login.html";
            return null;
        }
        return session;
    }

    function loadProducts(ownerId) {
        const key = `ecomarket_products_${ownerId}`;
        try { return JSON.parse(localStorage.getItem(key)) || []; }
        catch { return []; }
    }

    function saveProducts(ownerId, items) {
        const key = `ecomarket_products_${ownerId}`;
        localStorage.setItem(key, JSON.stringify(items));
    }

    function uid() {
        return Math.random().toString(16).slice(2) + Date.now().toString(16);
    }

    function formatPrice(value) {
        const num = Number(value);
        if (Number.isNaN(num)) return value;
        return num.toFixed(2).replace(".", ",");
    }

    function createRow(item) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
      <td class="td-name">
        <div class="row-main">
          <img class="thumb" src="${item.image || 'Imagenes/placeholder-producto.jpg'}" alt="">
          <div>
            <strong>${item.name}</strong>
            <div class="muted">ID: ${item.id.slice(0, 8)}</div>
          </div>
        </div>
      </td>
      <td>${item.origin}</td>
      <td><strong>${formatPrice(item.price)}</strong> <span class="muted">${item.unit}</span></td>
      <td class="td-actions">
        <button class="btn-mini btn-edit" data-id="${item.id}">Editar</button>
        <button class="btn-mini btn-danger" data-id="${item.id}">Eliminar</button>
      </td>
    `;
        return tr;
    }

    function renderTable(items) {
        const tbody = document.getElementById("productsTbody");
        tbody.innerHTML = "";

        if (!items.length) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td colspan="4" class="empty">Aún no has añadido productos.</td>`;
            tbody.appendChild(tr);
            return;
        }

        items.forEach(p => tbody.appendChild(createRow(p)));
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const session = requireProducer();
        if (!session) return;

        document.getElementById("producerName").textContent = session.name || "Productor";

        const ownerId = session.id || "demo";
        let products = loadProducts(ownerId);

        if (products.length === 0) {
            products = [
                { id: uid(), name: "Zanahorias ecológicas", origin: "Gran Canaria", price: 2.50, unit: "€/kg", image: "Imagenes/zanahoria.jpg" },
                { id: uid(), name: "Tomates de rama", origin: "Gran Canaria", price: 3.10, unit: "€/kg", image: "Imagenes/tomate.png" },
                { id: uid(), name: "Lechuga ecológica", origin: "Gran Canaria", price: 1.70, unit: "€/unidad", image: "Imagenes/lechuga.png" },
                { id: uid(), name: "Pepino", origin: "Gran Canaria", price: 0.75, unit: "€/kg", image: "Imagenes/pepino.jpg" },
            ];
            saveProducts(ownerId, products);
        }

        renderTable(products);

        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("ecomarket_session");
            window.location.href = "index.html";
        });

        document.getElementById("searchInput").addEventListener("input", (e) => {
            const q = e.target.value.toLowerCase().trim();
            const filtered = products.filter(p => p.name.toLowerCase().includes(q));
            renderTable(filtered);
        });

        document.getElementById("productForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("pName").value.trim();
            const origin = document.getElementById("pOrigin").value.trim();
            const price = document.getElementById("pPrice").value;
            const unit = document.getElementById("pUnit").value;
            const file = document.getElementById("pImage").files[0];

            let imageUrl = "";

            if (file) {
                imageUrl = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const item = { id: uid(), name, origin, price: Number(price), unit, image: imageUrl };

            products.unshift(item);
            saveProducts(ownerId, products);
            renderTable(products);

            e.target.reset();
        });

        document.getElementById("productsTbody").addEventListener("click", (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;

            const id = btn.dataset.id;
            if (!id) return;

            if (btn.classList.contains("btn-danger")) {
                products = products.filter(p => p.id !== id);
                saveProducts(ownerId, products);
                renderTable(products);
                return;
            }

            if (btn.classList.contains("btn-edit")) {
                const item = products.find(p => p.id === id);
                if (!item) return;

                const newName = prompt("Editar nombre:", item.name);
                if (newName === null) return;

                const newPrice = prompt("Editar precio (ej. 3.10):", String(item.price));
                if (newPrice === null) return;

                item.name = newName.trim() || item.name;
                item.price = Number(newPrice) || item.price;

                saveProducts(ownerId, products);
                renderTable(products);
            }
        });
    });
</script>

<script src="js/layout.js"></script>

</body>
</html>
