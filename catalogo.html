<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - EcoMarket</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/catalogo.css">
</head>

<body data-page="catalogo">

<div id="header-placeholder"></div>

<main class="contenedor-principal">
    <section class="cabecera-catalogo">
        <h2>Catálogo de productos</h2>
        <p>Frutas, verduras, miel, huevos y otros productos ecológicos de productores locales.</p>
    </section>

    <section class="grid-productos-mockup" id="catalogo-grid">
        <p>Cargando productos...</p>
    </section>
</main>

<div id="footer-placeholder"></div>

<script src="js/layout.js"></script>
<script>
    function formatPrice(value) {
        const num = Number(value);
        if (Number.isNaN(num)) return value;
        return num.toFixed(2).replace(".", ",");
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const grid = document.getElementById("catalogo-grid");
        
        try {
            const res = await fetch("http://localhost:3000/productos");
            if (!res.ok) throw new Error("Network response was not ok");
            const productos = await res.json();
            
            grid.innerHTML = "";
            
            if (productos.length === 0) {
                grid.innerHTML = "<p>No hay productos disponibles en este momento.</p>";
                return;
            }

            productos.forEach(p => {
                const article = document.createElement("article");
                article.className = "producto-card-mockup";
                
                const imgSrc = p.image || 'Imagenes/placeholder-producto.jpg'; // imagen por defecto si no tiene
                
                article.innerHTML = `
                    <div class="imagen-producto-dummy">
                        <img src="${imgSrc}" alt="${p.name}">
                    </div>
                    <div class="info-producto">
                        <h4>${p.name}</h4>
                        <p>Origen: ${p.origin}</p>
                        <p>Productor: ${p.ownerName || 'Productor local'}</p>
                        <p class="precio-destacado">${formatPrice(p.price)} ${p.unit}</p>
                        <div class="controles-compra" style="margin-top: 15px;">
                            <a href="detalle.html?id=${p.id}" class="btn-verde-comprar" style="display: block; text-align: center; text-decoration: none; width: 100%;">Ver detalle</a>
                        </div>
                    </div>
                `;
                
                grid.appendChild(article);
            });
            
        } catch(e) {
            grid.innerHTML = "<p>No se pudo cargar el catálogo. Comprueba si el servidor JSON está ejecutándose.</p>";
            console.error(e);
        }
    });
</script>
</body>
</html>
