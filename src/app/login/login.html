<main class="auth-page">
  <section class="auth-card">
    <header class="auth-header">
      <h1>Iniciar sesión</h1>
      <p>Accede para gestionar tus pedidos, direcciones y favoritos.</p>
    </header>

    <form class="auth-form" (ngSubmit)="onSubmit()" autocomplete="on">
      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <i class="fa-regular fa-envelope"></i>
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            placeholder="tuemail&#64;ejemplo.com"
            required
            [(ngModel)]="email"
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input
            id="password"
            name="password"
            [type]="passwordVisible ? 'text' : 'password'"
            placeholder="••••••••"
            required
            minlength="6"
            [(ngModel)]="password"
          />
          <button
            class="icon-btn"
            type="button"
            aria-label="Mostrar u ocultar contraseña"
            (click)="togglePassword()"
          >
            <i class="fa-regular" [ngClass]="passwordVisible ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      <div class="auth-row">
        <label class="checkbox">
          <input type="checkbox" name="remember" />
          <span>Recordarme</span>
        </label>

        <a class="auth-link" href="#">¿Has olvidado tu contraseña?</a>
      </div>

      <button class="btn btn-primary btn-block" type="submit">
        Entrar
      </button>

      <div class="divider">
        <span>o</span>
      </div>

      <button class="btn btn-secondary btn-block" type="button">
        <i class="fa-brands fa-google"></i>
        Continuar con Google
      </button>

      <p class="auth-footer-text">
        ¿No tienes cuenta?
        <a class="auth-link" routerLink="/registro">Crear cuenta</a>
      </p>
    </form>
  </section>
</main>
