<header class="main-header">
    <div class="header-container">

        <button class="menu-toggle" aria-label="Abrir menú" id="menu-toggle-btn" (click)="toggleMenu()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <a class="logo-section" routerLink="/">
            <img class="logo-img" src="../images/logo.JPG" alt="EcoMarket" />
            <div class="logo-text">
                <h1>EcoMarket</h1>
                <p>Sabor local, raíz ecológica</p>
            </div>
        </a>

        <nav class="main-nav" id="main-nav" [class.active]="isMenuOpen">
            <ul>
                <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a></li>
                <li><a routerLink="/catalogo" routerLinkActive="active">Catálogo</a></li>
                <li><a routerLink="/productores" routerLinkActive="active">Productores</a></li>
                <li><a routerLink="/contacto" routerLinkActive="active">Contacto</a></li>
                <li class="mobile-only-menu"><a routerLink="/login">Iniciar sesión</a></li>
            </ul>
        </nav>

        <div class="user-actions">
            <a class="login-link" routerLink="/login" id="login-link">
                <span class="account-icon mobile-login-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </span>
                <span class="login-text">Iniciar sesión</span>
            </a>
            <a class="cart-link cart-icon-only" href="carrito.html" aria-label="Ir al carrito">
                <span class="cart-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"></path>
                    </svg>
                </span>
                <span class="cart-count">0</span>
            </a>
        </div>

    </div>
</header>
