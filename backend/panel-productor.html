<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Área productor - EcoMarket</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/panel-productor.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body data-page="panel-productor">

<div id="header-placeholder"></div>

<main class="producer-page">
    <section class="producer-shell">

        <header class="producer-head">
            <div>
                <h1>Área de productor</h1>
                <p>Desde aquí puedes gestionar los productos que tienes en venta en EcoMarket.</p>
            </div>

            <div class="producer-user">
        <span class="pill">
          <i class="fa-solid fa-user"></i>
          <strong id="producerName">Productor</strong>
        </span>
                <button class="btn btn-secondary" id="logoutBtn" type="button">Cerrar sesión</button>
            </div>
        </header>

        <section class="producer-card">
            <h2>Añadir producto</h2>

            <form id="productForm" class="producer-form">
                <div class="field">
                    <label for="pName">Nombre</label>
                    <input id="pName" type="text" placeholder="Ej. Tomates de rama" required />
                </div>

                <div class="field">
                    <label for="pOrigin">Origen</label>
                    <input id="pOrigin" type="text" placeholder="Ej. Gran Canaria" required />
                </div>

                <div class="field">
                    <label for="pPrice">Precio (€)</label>
                    <input id="pPrice" type="number" min="0" step="0.01" placeholder="Ej. 3.10" required />
                </div>

                <div class="field">
                    <label for="pUnit">Unidad de precio</label>
                    <select id="pUnit" required>
                        <option value="€/kg">€/kg</option>
                        <option value="€/unidad">€/unidad</option>
                        <option value="€/l">€/l</option>
                        <option value="€/pack">€/pack</option>
                    </select>
                </div>

                <div class="field full">
                    <label for="pDescription">Descripción</label>
                    <textarea id="pDescription" placeholder="Añade una descripción para este producto..." rows="3" style="width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 12px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; resize: vertical;" required></textarea>
                </div>

                <div class="field">
                    <label for="pQuantity">Cantidad en Stock</label>
                    <input id="pQuantity" type="number" min="0" placeholder="Ej. 100" required />
                </div>

                <div class="field full">
                    <label>Imagen del producto</label>
                    <div style="display: flex; align-items: center; gap: 14px; margin-top: 4px;">
                        <label for="pImage" class="btn btn-secondary" style="cursor: pointer; width: auto; font-size: 0.95rem; padding: 10px 18px; margin: 0;">
                            <i class="fa-solid fa-upload"></i> Seleccionar imagen
                        </label>
                        <span id="fileNameDisplay" style="color: var(--light-grey); font-size: 0.95rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Ningún archivo seleccionado</span>
                    </div>
                    <input id="pImage" type="file" accept="image/*" style="display: none;" onchange="document.getElementById('fileNameDisplay').textContent = this.files.length > 0 ? this.files[0].name : 'Ningún archivo seleccionado'" />
                    <small style="margin-top: 8px; display: block;">Opcional. Si no subes imagen, se usará un placeholder.</small>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">
                        <i class="fa-solid fa-plus"></i>
                        Añadir producto
                    </button>
                </div>
            </form>
        </section>

        <section class="producer-card">
            <div class="table-head">
                <h2>Mis productos en venta</h2>
                <div class="table-tools">
                    <input id="searchInput" class="search" type="search" placeholder="Buscar por nombre..." />
                </div>
            </div>

            <div class="table-wrap">
                <table class="producer-table">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Origen</th>
                        <th>Precio</th>
                        <th>Disponibilidad</th>
                        <th class="th-actions">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="productsTbody"></tbody>
                </table>
            </div>
        </section>

    </section>
</main>

<div id="footer-placeholder"></div>

<script>
    function getSession() {
        try { return JSON.parse(localStorage.getItem("ecomarket_session")); }
        catch { return null; }
    }

    function requireProducer() {
        const session = getSession();
        if (!session || session.rol !== "productor") {
            window.location.href = "login.html";
            return null;
        }
        return session;
    }

    async function fetchProducts(ownerId) {
        try {
            const res = await fetch(`http://localhost:3000/productos`);
            if (!res.ok) throw new Error("Error en servidor");
            const allProducts = await res.json();
            return allProducts.filter(p => String(p.ownerId) === String(ownerId));
        } catch(e) {
            console.error(e);
            return [];
        }
    }

    function formatPrice(value) {
        const num = Number(value);
        if (Number.isNaN(num)) return value;
        return num.toFixed(2).replace(".", ",");
    }

    function createRow(item) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
      <td class="td-name">
        <div class="row-main">
          <img class="thumb" src="${item.image || 'Imagenes/placeholder-producto.jpg'}" alt="">
          <div>
            <strong>${item.name}</strong>
            <div class="muted">ID: ${item.id ? item.id.toString().slice(0, 8) : ''}</div>
          </div>
        </div>
      </td>
      <td>${item.origin}</td>
      <td><strong>${formatPrice(item.price)}</strong> <span class="muted">${item.unit}</span></td>
      <td>${item.quantity !== undefined ? item.quantity : 0}</td>
      <td class="td-actions">
        <button class="btn-mini btn-edit" data-id="${item.id}">Editar</button>
        <button class="btn-mini btn-danger" data-id="${item.id}">Eliminar</button>
      </td>
    `;
        return tr;
    }

    function renderTable(items) {
        const tbody = document.getElementById("productsTbody");
        tbody.innerHTML = "";

        if (!items.length) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td colspan="4" class="empty">Aún no has añadido productos.</td>`;
            tbody.appendChild(tr);
            return;
        }

        items.forEach(p => tbody.appendChild(createRow(p)));
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const session = requireProducer();
        if (!session) return;

        document.getElementById("producerName").textContent = session.name || "Productor";

        const ownerId = session.id;
        
        // Cargar desde json-server buscando solo los del owner actual
        let products = await fetchProducts(ownerId);
        renderTable(products);

        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("ecomarket_session");
            window.location.href = "index.html";
        });

        document.getElementById("searchInput").addEventListener("input", (e) => {
            const q = e.target.value.toLowerCase().trim();
            const filtered = products.filter(p => p.name.toLowerCase().includes(q));
            renderTable(filtered);
        });

        document.getElementById("productForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("pName").value.trim();
            const origin = document.getElementById("pOrigin").value.trim();
            const price = document.getElementById("pPrice").value;
            const unit = document.getElementById("pUnit").value;
            const description = document.getElementById("pDescription").value.trim();
            const quantity = document.getElementById("pQuantity").value;
            const file = document.getElementById("pImage").files[0];

            let imageUrl = "";

            if (file) {
                imageUrl = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const item = { 
                ownerId, // Sólo añade sus propios productos
                ownerName: session.name, // Para uso opcional en catálogo
                name, 
                origin, 
                price: Number(price), 
                unit, 
                description,
                quantity: Number(quantity),
                image: imageUrl 
            };

            try {
                const res = await fetch("http://localhost:3000/productos", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(item)
                });
                
                if (res.ok) {
                    const newItem = await res.json();
                    products.unshift(newItem);
                    renderTable(products);
                    e.target.reset();
                    Swal.fire({ icon: 'success', title: 'Añadido', text: 'Producto añadido correctamente', timer: 1500, showConfirmButton: false });
                } else {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo añadir el producto', confirmButtonColor: '#4CAF50' });
                }
            } catch(e) {
                Swal.fire({ icon: 'error', title: 'Error de red', text: 'Error conectando al servidor JSON.', confirmButtonColor: '#4CAF50' });
            }
        });

        document.getElementById("productsTbody").addEventListener("click", async (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;

            const id = btn.dataset.id;
            if (!id) return;

            if (btn.classList.contains("btn-danger")) {
                const result = await Swal.fire({
                    title: '¿Estás seguro?',
                    text: "Borrarás este producto permanentemente",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#aaa',
                    confirmButtonText: 'Sí, borrar',
                    cancelButtonText: 'Cancelar'
                });
                
                if(!result.isConfirmed) return;
                
                try {
                    const res = await fetch(`http://localhost:3000/productos/${id}`, { method: "DELETE" });
                    if(res.ok) {
                        products = products.filter(p => String(p.id) !== String(id));
                        renderTable(products);
                        Swal.fire({ icon: 'success', title: 'Borrado', text: 'El producto ha sido eliminado', timer: 1500, showConfirmButton: false });
                    } else {
                        Swal.fire({ icon: 'error', title: 'Error', text: 'No pudimos borrar el producto en el servidor.', confirmButtonColor: '#4CAF50' });
                    }
                } catch(e) {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'Error de red', confirmButtonColor: '#4CAF50' });
                }
                return;
            }

            if (btn.classList.contains("btn-edit")) {
                const item = products.find(p => String(p.id) === String(id));
                if (!item) return;

                const { value: formValues } = await Swal.fire({
                    title: 'Editar Producto',
                    html: `
                        <div style="text-align: left; margin-bottom: 15px; padding: 0 10px;">
                            <label for="swal-input-name" style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px;">Nombre del producto</label>
                            <input id="swal-input-name" class="swal2-input" style="margin: 0; width: 100%; box-sizing: border-box;" placeholder="Nombre" value="${item.name}">
                        </div>
                        <div style="text-align: left; margin-bottom: 15px; padding: 0 10px;">
                            <label for="swal-input-price" style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px;">Precio</label>
                            <input id="swal-input-price" type="number" step="0.01" class="swal2-input" style="margin: 0; width: 100%; box-sizing: border-box;" placeholder="Precio" value="${item.price}">
                        </div>
                        <div style="text-align: left; margin-bottom: 15px; padding: 0 10px;">
                            <label for="swal-input-qty" style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px;">Disponibilidad (Stock)</label>
                            <input id="swal-input-qty" type="number" class="swal2-input" style="margin: 0; width: 100%; box-sizing: border-box;" placeholder="Disponibilidad" value="${item.quantity || 0}">
                        </div>
                        <div style="margin-top: 15px; text-align: left; padding: 0 10px;">
                            <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 8px;">Foto (opcional):</label>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <label for="swal-input-image" class="btn btn-secondary" style="cursor: pointer; padding: 8px 14px; font-size: 0.9rem; margin: 0;">
                                    <i class="fa-solid fa-upload"></i> Subir imagen
                                </label>
                                <span id="swalFileName" style="color: #666; font-size: 0.85rem; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Ningún archivo</span>
                            </div>
                            <input id="swal-input-image" type="file" accept="image/*" style="display: none;" onchange="document.getElementById('swalFileName').textContent = this.files.length > 0 ? this.files[0].name : 'Ningún archivo'">
                        </div>
                    `,
                    focusConfirm: false,
                    showCancelButton: true,
                    confirmButtonText: 'Guardar',
                    cancelButtonText: 'Cancelar',
                    confirmButtonColor: '#4CAF50',
                    preConfirm: () => {
                        const newName = document.getElementById('swal-input-name').value;
                        const newPrice = document.getElementById('swal-input-price').value;
                        const newQty = document.getElementById('swal-input-qty').value;
                        const fileInput = document.getElementById('swal-input-image');
                        return { newName, newPrice, newQty, file: fileInput.files[0] };
                    }
                });

                if (formValues) {
                    const { newName, newPrice, newQty, file } = formValues;

                    if (!newName || !newPrice) {
                        Swal.fire({ icon: 'warning', title: 'Atención', text: 'Nombre y precio son obligatorios', confirmButtonColor: '#4CAF50' });
                        return;
                    }

                    let patchData = {
                        name: newName.trim(),
                        price: Number(newPrice),
                        quantity: Number(newQty)
                    };

                    if (file) {
                        const imageUrl = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result);
                            reader.readAsDataURL(file);
                        });
                        patchData.image = imageUrl;
                    }

                    try {
                        const res = await fetch(`http://localhost:3000/productos/${id}`, {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(patchData)
                        });
                        
                        if (res.ok) {
                            const updatedItem = await res.json();
                            const index = products.findIndex(p => String(p.id) === String(id));
                            products[index] = updatedItem;
                            renderTable(products);
                            Swal.fire({ icon: 'success', title: 'Actualizado', text: 'Producto actualizado con éxito', timer: 1500, showConfirmButton: false });
                        } else {
                            Swal.fire({ icon: 'error', title: 'Error', text: 'Fallo al actualizar el producto en el servidor', confirmButtonColor: '#4CAF50' });
                        }
                    } catch(e) {
                        Swal.fire({ icon: 'error', title: 'Error', text: 'Error de red', confirmButtonColor: '#4CAF50' });
                    }
                }
            }
        });
    });
</script>

<script src="js/layout.js"></script>

</body>
</html>
