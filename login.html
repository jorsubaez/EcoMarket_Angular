<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión - EcoMarket</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
<div id="header-placeholder"></div>

<main class="auth-page">
    <section class="auth-card">
        <header class="auth-header">
            <h1>Iniciar sesión</h1>
            <p>Accede para gestionar tus pedidos, direcciones y favoritos.</p>
        </header>

        <form class="auth-form" action="#" method="post" autocomplete="on">
            <div class="field">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <i class="fa-regular fa-envelope"></i>
                    <input id="email" name="email" type="email" placeholder="tuemail@ejemplo.com" required />
                </div>
            </div>

            <div class="field">
                <label for="password">Contraseña</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input id="password" name="password" type="password" placeholder="••••••••" required minlength="6" />
                    <button class="icon-btn" type="button" aria-label="Mostrar/ocultar contraseña" id="togglePassword">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="auth-row">
                <label class="checkbox">
                    <input type="checkbox" name="remember" />
                    <span>Recordarme</span>
                </label>

                <a class="auth-link" href="#">¿Has olvidado tu contraseña?</a>
            </div>

            <button class="btn btn-primary btn-block" type="submit">
                Entrar
            </button>

            <div class="divider">
                <span>o</span>
            </div>

            <button class="btn btn-secondary btn-block" type="button">
                <i class="fa-brands fa-google"></i>
                Continuar con Google
            </button>

            <p class="auth-footer-text">
                ¿No tienes cuenta?
                <a class="auth-link" href="registro.html">Crear cuenta</a>
            </p>
        </form>
    </section>
</main>

<div id="footer-placeholder"></div>

<script src="js/layout.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const loginForm = document.querySelector('.auth-form');
        const btnToggle = document.getElementById('togglePassword');
        const inputPass = document.getElementById('password');

        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                try {
                    const response = await fetch('db.json');
                    const data = await response.json();

                    const usuarioEncontrado = data.usuarios.find(usuario =>
                        usuario.email === email && usuario.password === password
                    );

                    if (usuarioEncontrado) {
                        const sessionData = {
                            id: usuarioEncontrado.id,
                            name: usuarioEncontrado.nombre,
                            email: usuarioEncontrado.email,
                            role: usuarioEncontrado.rol
                        };

                        localStorage.setItem("ecomarket_session", JSON.stringify(sessionData));
                        window.location.replace("perfil.html");
                    } else {
                        alert("Email o contraseña incorrectos");
                    }
                } catch (error) {
                    console.error("Error al cargar db.json:", error);
                    alert("No se pudo iniciar sesión. Revisa que db.json esté bien ubicado.");
                }
            });
        }

        if (btnToggle && inputPass) {
            btnToggle.addEventListener('click', () => {
                const isPassword = inputPass.type === 'password';
                inputPass.type = isPassword ? 'text' : 'password';
                btnToggle.innerHTML = isPassword
                    ? '<i class="fa-regular fa-eye-slash"></i>'
                    : '<i class="fa-regular fa-eye"></i>';
            });
        }
    });
</script>
</body>
</html>
