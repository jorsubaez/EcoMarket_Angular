<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión - EcoMarket</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
<div id="header-placeholder"></div>

<main class="auth-page">
    <section class="auth-card">
        <header class="auth-header">
            <h1>Iniciar sesión</h1>
            <p>Accede para gestionar tus pedidos, direcciones y favoritos.</p>
        </header>

        <form class="auth-form" action="#" method="post" autocomplete="on">
            <div class="field">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <i class="fa-regular fa-envelope"></i>
                    <input id="email" name="email" type="email" placeholder="tuemail@ejemplo.com" required />
                </div>
            </div>

            <div class="field">
                <label for="password">Contraseña</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input id="password" name="password" type="password" placeholder="••••••••" required minlength="6" />
                    <button class="icon-btn" type="button" aria-label="Mostrar/ocultar contraseña" id="togglePassword">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="auth-row">
                <label class="checkbox">
                    <input type="checkbox" name="remember" />
                    <span>Recordarme</span>
                </label>

                <a class="auth-link" href="#">¿Has olvidado tu contraseña?</a>
            </div>

            <button class="btn btn-primary btn-block" type="submit">
                Entrar
            </button>

            <div class="divider">
                <span>o</span>
            </div>

            <button class="btn btn-secondary btn-block" type="button">
                <i class="fa-brands fa-google"></i>
                Continuar con Google
            </button>

            <p class="auth-footer-text">
                ¿No tienes cuenta?
                <a class="auth-link" href="registro.html">Crear cuenta</a>
            </p>
        </form>
    </section>
</main>

<div id="footer-placeholder"></div>

<script>
    // ----- Header/Footer loader (igual que el tuyo) -----
    function loadComponent(url, elementId) {
        return fetch(url)
            .then(response => {
                if (!response.ok) throw new Error('Error al cargar ' + url);
                return response.text();
            })
            .then(html => {
                document.getElementById(elementId).innerHTML = html;
            });
    }

    function setActiveNavLink() {
        const file = window.location.pathname.split('/').pop() || 'index.html';
        const pageMap = {
            'index.html': 'index',
            'catalogo.html': 'catalogo',
            'productores.html': 'productores',
            'contacto.html': 'contacto',
            'perfil.html': 'perfil',
            'login.html': null,
            'registro.html': null
        };
        const current = pageMap[file];

        document.querySelectorAll('.nav-link').forEach(a => {
            a.classList.toggle('active', current && a.dataset.page === current);
        });
    }

    document.addEventListener("DOMContentLoaded", async () => {
        await loadComponent('templates/header.html', 'header-placeholder');
        await loadComponent('templates/footer.html', 'footer-placeholder');
        setActiveNavLink();

        // Toggle password
        const btn = document.getElementById('togglePassword');
        const input = document.getElementById('password');
        if (btn && input) {
            btn.addEventListener('click', () => {
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                btn.innerHTML = isPassword
                    ? '<i class="fa-regular fa-eye-slash"></i>'
                    : '<i class="fa-regular fa-eye"></i>';
            });
        }
    });
</script>
</body>
</html>
