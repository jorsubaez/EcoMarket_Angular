<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión - EcoMarket</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
<div id="header-placeholder"></div>

<main class="auth-page">
    <section class="auth-card">
        <header class="auth-header">
            <h1>Iniciar sesión</h1>
            <p>Accede para gestionar tus pedidos, direcciones y favoritos.</p>
        </header>

        <form class="auth-form" action="#" method="post" autocomplete="on">
            <div class="field">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <i class="fa-regular fa-envelope"></i>
                    <input id="email" name="email" type="email" placeholder="tuemail@ejemplo.com" required />
                </div>
            </div>

            <div class="field">
                <label for="password">Contraseña</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input id="password" name="password" type="password" placeholder="••••••••" required minlength="6" />
                    <button class="icon-btn" type="button" aria-label="Mostrar/ocultar contraseña" id="togglePassword">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="auth-row">
                <label class="checkbox">
                    <input type="checkbox" name="remember" />
                    <span>Recordarme</span>
                </label>

                <a class="auth-link" href="#">¿Has olvidado tu contraseña?</a>
            </div>

            <button class="btn btn-primary btn-block" type="submit">
                Entrar
            </button>

            <div class="divider">
                <span>o</span>
            </div>

            <button class="btn btn-secondary btn-block" type="button">
                <i class="fa-brands fa-google"></i>
                Continuar con Google
            </button>

            <p class="auth-footer-text">
                ¿No tienes cuenta?
                <a class="auth-link" href="registro.html">Crear cuenta</a>
            </p>
        </form>
    </section>
</main>

<div id="footer-placeholder"></div>

<script>
    const API_URL = "http://localhost:3000";

    async function loadComponent(url, elementId) {
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Error al cargar ' + url);
            document.getElementById(elementId).innerHTML = await response.text();
        } catch (err) {
            console.error("No se pudo cargar el componente:", err);
        }
    }

    function saveSession(user) {
        // Guardamos solo lo necesario (demo)
        const sessionData = {
            id: user.id,
            name: user.nombre,
            email: user.email,
            role: user.rol, // admin | productor | cliente
            loginAt: new Date().toISOString()
        };
        localStorage.setItem("ecomarket_session", JSON.stringify(sessionData));
    }

    function redirectByRole(role) {
        // Ajusta los nombres si tus páginas se llaman diferente
        if (role === "admin") {
            window.location.replace("admin.html");
        } else if (role === "productor") {
            window.location.replace("panel-productor.html");
        } else {
            window.location.replace("perfil.html"); // cliente
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const loginForm = document.querySelector('.auth-form');
        const btnToggle = document.getElementById('togglePassword');
        const inputPass = document.getElementById('password');

        await loadComponent('templates/header.html', 'header-placeholder');
        await loadComponent('templates/footer.html', 'footer-placeholder');

        // Toggle password
        if (btnToggle && inputPass) {
            btnToggle.addEventListener('click', () => {
                const isPassword = inputPass.type === 'password';
                inputPass.type = isPassword ? 'text' : 'password';
                btnToggle.innerHTML = isPassword
                    ? '<i class="fa-regular fa-eye-slash"></i>'
                    : '<i class="fa-regular fa-eye"></i>';
            });
        }

        // LOGIN contra db.json (JSON Server)
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                try {
                    const url = `${API_URL}/usuarios?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`;
                    const res = await fetch(url);

                    if (!res.ok) throw new Error("HTTP " + res.status);

                    const users = await res.json();

                    if (!users || users.length === 0) {
                        alert("Email o contraseña incorrectos");
                        return;
                    }

                    const user = users[0];
                    saveSession(user);
                    redirectByRole(user.rol);

                } catch (err) {
                    console.error(err);
                    alert("No se pudo conectar con el servidor de usuarios. ¿Tienes JSON Server en http://localhost:3000?");
                }
            });
        }
    });
</script>
</body>
</html>
