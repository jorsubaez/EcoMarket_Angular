<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - EcoMarket</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/perfil.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body data-page="perfil">

    <div id="header-placeholder"></div>

    <main class="central-container">

        <!-- SIDEBAR -->
        <aside class="sidebar-panel">
            <button class="slider-arrow prev" aria-label="Anterior">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>

            <div class="sidebar-scroll-container">
                <a class="sidebar-button" href="#">Mi perfil</a>
                <a class="sidebar-button" href="#">Mis pedidos</a>
                <a class="sidebar-button" href="#">Direcciones</a>
                <a class="sidebar-button" href="#">Ajustes</a>
                <a class="sidebar-button" href="#">Cerrar sesión</a>
            </div>

            <button class="slider-arrow next" aria-label="Siguiente">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <section class="main-content">

            <div class="profile-pic">
                <img src="Imagenes/Foto%20perfil.png" alt="Foto de perfil">
            </div>

            <h3>Nombre del usuario</h3>
            <h4>Tipo de cuenta</h4>

            <div class="profile-cards">
                <div class="info-card">
                    <p class="info-label">Email</p>
                    <p class="info-value">email@ejemplo.com</p>
                </div>

                <div class="info-card">
                    <p class="info-label">Teléfono</p>
                    <p class="info-value">+34 600 000 000</p>
                </div>

                <div class="info-card">
                    <p class="info-label">Dirección principal</p>
                    <p class="info-value">Añade una dirección</p>
                </div>
            </div>

            <div class="description-text">
                <p>
                    Información del perfil del usuario.
                </p>

                <div class="profile-actions">
                    <a class="btn btn-primary" href="#">Editar perfil</a>
                    <a class="btn btn-secondary" href="#">Ver pedidos</a>
                </div>
            </div>

        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script>
        function getSession() {
            try {
                return JSON.parse(localStorage.getItem("ecomarket_session"));
            } catch (e) {
                return null;
            }
        }

        function requireSession() {
            const session = getSession();
            if (!session) {
                window.location.href = "login.html";
                return null;
            }
            return session;
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const session = requireSession();
            if (!session) return;

            let currentUser = null;
            try {
                const res = await fetch(`http://localhost:3000/usuarios/${session.id}`);
                if(res.ok) currentUser = await res.json();
            } catch(e) {
                console.warn("No se pudo cargar detalles del usuario desde json-server");
            }

            const userNameEl = document.querySelector(".main-content h3");
            const userEmailEl = document.querySelector(".info-card:nth-child(1) .info-value");
            const userPhoneEl = document.querySelector(".info-card:nth-child(2) .info-value");
            const userAddressEl = document.querySelector(".info-card:nth-child(3) .info-value");

            if (userNameEl) userNameEl.textContent = currentUser?.nombre || session.name || "Usuario EcoMarket";
            if (userEmailEl) userEmailEl.textContent = currentUser?.email || session.email || "email@ejemplo.com";
            if (userPhoneEl) userPhoneEl.textContent = currentUser?.telefono || "No especificado";
            if (userAddressEl) userAddressEl.textContent = currentUser?.direccion || "Añade una dirección";

            const btnEdit = document.querySelector('.btn-primary');
            if (btnEdit) {
                btnEdit.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const { value: formValues } = await Swal.fire({
                        title: 'Editar Perfil',
                        width: '600px',
                        html: `
                            <style>
                                .custom-swal-field {
                                    width: 100%;
                                    box-sizing: border-box;
                                    padding: 12px 14px;
                                    font-size: 0.95rem;
                                    font-family: inherit;
                                    border: 1px solid rgba(0,0,0,0.12);
                                    border-radius: 12px;
                                    outline: none;
                                    background: #fff;
                                    transition: border-color 0.2s, box-shadow 0.2s;
                                    margin: 0;
                                }
                                .custom-swal-field:focus {
                                    border-color: rgba(46,125,50,0.45);
                                    box-shadow: 0 0 0 4px rgba(46,125,50,0.12);
                                }
                                .swal-container-grid { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
                                .swal-label { font-weight: 700; font-size: 0.95rem; margin-bottom: 6px; display: block; color: var(--dark-grey); }
                            </style>
                            <div style="text-align: left; margin-bottom: 10px; width: 100%; box-sizing: border-box;">
                                <label class="swal-label">Datos personales</label>
                                <div class="swal-container-grid">
                                    <input id="swal-name" class="custom-swal-field" style="flex:1;" placeholder="Nombre / Apellidos" value="${currentUser?.nombre || session.name || ''}">
                                    <input id="swal-email" type="email" class="custom-swal-field" style="flex:1;" placeholder="Email" value="${currentUser?.email || session.email || ''}">
                                </div>
                                
                                <label class="swal-label">Teléfono</label>
                                <div class="swal-container-grid">
                                    <select id="swal-prefix" class="custom-swal-field" style="flex: 0 0 110px; cursor: pointer; padding: 12px 8px;">
                                        <option value="+34" data-max="9">🇪🇸 +34</option>
                                        <option value="+1" data-max="10">🇺🇸 +1</option>
                                        <option value="+44" data-max="10">🇬🇧 +44</option>
                                        <option value="+33" data-max="9">🇫🇷 +33</option>
                                        <option value="+49" data-max="11">🇩🇪 +49</option>
                                        <option value="+39" data-max="10">🇮🇹 +39</option>
                                        <option value="+351" data-max="9">🇵🇹 +351</option>
                                        <option value="+52" data-max="10">🇲🇽 +52</option>
                                        <option value="+54" data-max="10">🇦🇷 +54</option>
                                        <option value="+57" data-max="10">🇨🇴 +57</option>
                                    </select>
                                    <input id="swal-phone" type="number" class="custom-swal-field" style="flex: 1;" placeholder="Nº de teléfono">
                                </div>

                                <label class="swal-label">Dirección</label>
                                <div class="swal-container-grid" style="margin-bottom: 10px;">
                                    <select id="swal-street-type" class="custom-swal-field" style="flex: 0 0 130px; cursor: pointer;">
                                        <option value="Calle">Calle</option>
                                        <option value="Avenida">Avenida</option>
                                        <option value="Paseo">Paseo</option>
                                        <option value="Carretera">Carretera</option>
                                        <option value="Plaza">Plaza</option>
                                        <option value="Urbanización">Urbanización</option>
                                        <option value="Camino">Camino</option>
                                    </select>
                                    <input id="swal-street-name" class="custom-swal-field" style="flex: 1;" placeholder="Nombre de la vía">
                                </div>
                                <div class="swal-container-grid" style="margin-bottom: 0;">
                                    <input id="swal-street-num" class="custom-swal-field" style="flex: 1;" placeholder="Número">
                                    <input id="swal-street-door" class="custom-swal-field" style="flex: 1;" placeholder="Bajo, 4ºA...">
                                </div>
                            </div>
                        `,
                        focusConfirm: false,
                        showCancelButton: true,
                        confirmButtonText: 'Guardar',
                        cancelButtonText: 'Cancelar',
                        confirmButtonColor: '#4CAF50',
                        didOpen: () => {
                            // Pre-fill phone if exists
                            const currentPhone = currentUser?.telefono || '';
                            if (currentPhone) {
                                const parts = currentPhone.split(' ');
                                if (parts.length >= 2) {
                                    document.getElementById('swal-prefix').value = parts[0];
                                    document.getElementById('swal-phone').value = parts.slice(1).join('');
                                } else {
                                    document.getElementById('swal-phone').value = currentPhone;
                                }
                            }
                            
                            // Pre-fill rough address structure if exists
                            const currentAddress = currentUser?.direccion || '';
                            if (currentAddress && currentAddress.includes(' ')) {
                                // Super rough heuristic parsing for pre-existing addresses
                                const parts = currentAddress.split(',');
                                const firstPart = parts[0].trim().split(' ');
                                const possibleType = firstPart[0];
                                const typeSelect = document.getElementById('swal-street-type');
                                
                                let isValidType = false;
                                for(let opt of typeSelect.options) {
                                    if(opt.value === possibleType) isValidType = true;
                                }
                                
                                if (isValidType) {
                                    typeSelect.value = possibleType;
                                    document.getElementById('swal-street-name').value = firstPart.slice(1).join(' ');
                                } else {
                                    document.getElementById('swal-street-name').value = parts[0].trim();
                                }
                                
                                if (parts.length > 1) {
                                    document.getElementById('swal-street-num').value = parts[1].trim();
                                }
                                if (parts.length > 2) {
                                    document.getElementById('swal-street-door').value = parts[2].trim();
                                }
                            }
                        },
                        preConfirm: () => {
                            const email = document.getElementById('swal-email').value.trim();
                            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                            
                            if (!emailRegex.test(email)) {
                                Swal.showValidationMessage('El formato del correo no es válido.');
                                return false;
                            }

                            const phoneSelect = document.getElementById('swal-prefix');
                            const phonePrefix = phoneSelect.value;
                            const maxDigits = parseInt(phoneSelect.options[phoneSelect.selectedIndex].getAttribute('data-max'));
                            const phoneBodyRaw = document.getElementById('swal-phone').value.trim();
                            
                            if (phoneBodyRaw) {
                                if (phoneBodyRaw.length > maxDigits) {
                                    Swal.showValidationMessage(`Para el prefijo ${phonePrefix}, el número no puede tener más de ${maxDigits} dígitos.`);
                                    return false;
                                }
                                if (phoneBodyRaw.length < Math.max(7, maxDigits - 2)) {
                                    Swal.showValidationMessage(`El teléfono parece ser demasiado corto para ${phonePrefix}.`);
                                    return false;
                                }
                            }

                            const finalPhone = phoneBodyRaw ? `${phonePrefix} ${phoneBodyRaw}` : '';
                            
                            const sType = document.getElementById('swal-street-type').value;
                            const sName = document.getElementById('swal-street-name').value.trim();
                            const sNum = document.getElementById('swal-street-num').value.trim();
                            const sDoor = document.getElementById('swal-street-door').value.trim();
                            
                            const finalAddress = sName ? `${sType} ${sName}, ${sNum}${sDoor ? ', ' + sDoor : ''}` : '';

                            return {
                                nombre: document.getElementById('swal-name').value,
                                email: email,
                                telefono: finalPhone,
                                direccion: finalAddress
                            }
                        }
                    });

                    if (formValues) {
                        try {
                            const res = await fetch(`http://localhost:3000/usuarios/${session.id}`, {
                                method: 'PATCH',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(formValues)
                            });
                            
                            if(res.ok) {
                                const updatedUser = await res.json();
                                if (userNameEl) userNameEl.textContent = updatedUser.nombre;
                                if (userEmailEl) userEmailEl.textContent = updatedUser.email;
                                if (userPhoneEl) userPhoneEl.textContent = updatedUser.telefono || "No especificado";
                                if (userAddressEl) userAddressEl.textContent = updatedUser.direccion || "Añade una dirección";
                                
                                session.name = updatedUser.nombre;
                                session.email = updatedUser.email;
                                localStorage.setItem("ecomarket_session", JSON.stringify(session));
                                currentUser = updatedUser;
                                
                                Swal.fire({ icon: 'success', title: 'Actualizado', text: 'Perfil guardado', timer: 1500, showConfirmButton: false });
                            } else {
                                Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo guardar el perfil', confirmButtonColor: '#4CAF50' });
                            }
                        } catch(e) {
                            Swal.fire({ icon: 'error', title: 'Error', text: 'Error de red', confirmButtonColor: '#4CAF50' });
                        }
                    }
                });
            }

            const sidebarButtons = document.querySelectorAll(".sidebar-button");
            const logoutBtn = Array.from(sidebarButtons).find(btn => btn.textContent.includes("Cerrar sesión"));

            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("ecomarket_session");
                    window.location.href = "index.html";
                });
            }

            // LÓGICA DEL SLIDER DEL SIDEBAR (MÓVIL/TABLET)
            const scrollContainer = document.querySelector(".sidebar-scroll-container");
            const prevBtn = document.querySelector(".slider-arrow.prev");
            const nextBtn = document.querySelector(".slider-arrow.next");

            if (scrollContainer && prevBtn && nextBtn) {
                const scrollAmount = 200; // Ajuste para mover aproximadamente 2 elementos

                prevBtn.addEventListener("click", () => {
                    scrollContainer.scrollBy({ left: -scrollAmount, behavior: "smooth" });
                });

                nextBtn.addEventListener("click", () => {
                    scrollContainer.scrollBy({ left: scrollAmount, behavior: "smooth" });
                });

                // Función para atenuar flechas si no hay más scroll
                const updateArrows = () => {
                    const { scrollLeft, scrollWidth, clientWidth } = scrollContainer;
                    prevBtn.style.opacity = scrollLeft <= 2 ? "0.3" : "1";
                    prevBtn.style.pointerEvents = scrollLeft <= 2 ? "none" : "auto";

                    const isAtEnd = scrollLeft + clientWidth >= scrollWidth - 2;
                    nextBtn.style.opacity = isAtEnd ? "0.3" : "1";
                    nextBtn.style.pointerEvents = isAtEnd ? "none" : "auto";
                };

                scrollContainer.addEventListener("scroll", updateArrows);
                window.addEventListener("resize", updateArrows);

                // Ejecutar tras un pequeño delay para asegurar renderizado
                setTimeout(updateArrows, 100);
            }
        });
    </script>

    <script src="js/layout.js"></script>

</body>

</html>
