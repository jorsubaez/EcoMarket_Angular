<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - EcoMarket</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>

<body data-page="perfil">

    <div id="header-placeholder"></div>

    <main class="central-container">

        <!-- SIDEBAR -->
        <aside class="sidebar-panel">
            <button class="slider-arrow prev" aria-label="Anterior">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>

            <div class="sidebar-scroll-container">
                <a class="sidebar-button" href="#">Mi perfil</a>
                <a class="sidebar-button" href="#">Mis pedidos</a>
                <a class="sidebar-button" href="#">Direcciones</a>
                <a class="sidebar-button" href="#">Ajustes</a>
                <a class="sidebar-button" href="#">Cerrar sesión</a>
            </div>

            <button class="slider-arrow next" aria-label="Siguiente">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <section class="main-content">

            <div class="profile-pic">
                <img src="Imagenes/Foto%20perfil.png" alt="Foto de perfil">
            </div>

            <h3>Nombre del usuario</h3>
            <h4>Tipo de cuenta</h4>

            <div class="profile-cards">
                <div class="info-card">
                    <p class="info-label">Email</p>
                    <p class="info-value">email@ejemplo.com</p>
                </div>

                <div class="info-card">
                    <p class="info-label">Teléfono</p>
                    <p class="info-value">+34 600 000 000</p>
                </div>

                <div class="info-card">
                    <p class="info-label">Dirección principal</p>
                    <p class="info-value">Añade una dirección</p>
                </div>
            </div>

            <div class="description-text">
                <p>
                    Información del perfil del usuario.
                </p>

                <div class="profile-actions">
                    <a class="btn btn-primary" href="#">Editar perfil</a>
                    <a class="btn btn-secondary" href="#">Ver pedidos</a>
                </div>
            </div>

        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script>
        function getSession() {
            try {
                return JSON.parse(localStorage.getItem("ecomarket_session"));
            } catch (e) {
                return null;
            }
        }

        function requireSession() {
            const session = getSession();
            if (!session) {
                window.location.href = "login.html";
                return null;
            }
            return session;
        }

        document.addEventListener("DOMContentLoaded", () => {
            const session = requireSession();
            if (!session) return;

            const userNameEl = document.querySelector(".main-content h3");
            const userEmailEl = document.querySelector(".info-card:nth-child(1) .info-value");

            if (userNameEl) userNameEl.textContent = session.name || "Usuario EcoMarket";
            if (userEmailEl) userEmailEl.textContent = session.email || "email@ejemplo.com";

            const sidebarButtons = document.querySelectorAll(".sidebar-button");
            const logoutBtn = Array.from(sidebarButtons).find(btn => btn.textContent.includes("Cerrar sesión"));

            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("ecomarket_session");
                    window.location.href = "index.html";
                });
            }

            // LÓGICA DEL SLIDER DEL SIDEBAR (MÓVIL/TABLET)
            const scrollContainer = document.querySelector(".sidebar-scroll-container");
            const prevBtn = document.querySelector(".slider-arrow.prev");
            const nextBtn = document.querySelector(".slider-arrow.next");

            if (scrollContainer && prevBtn && nextBtn) {
                const scrollAmount = 200; // Ajuste para mover aproximadamente 2 elementos

                prevBtn.addEventListener("click", () => {
                    scrollContainer.scrollBy({ left: -scrollAmount, behavior: "smooth" });
                });

                nextBtn.addEventListener("click", () => {
                    scrollContainer.scrollBy({ left: scrollAmount, behavior: "smooth" });
                });

                // Función para atenuar flechas si no hay más scroll
                const updateArrows = () => {
                    const { scrollLeft, scrollWidth, clientWidth } = scrollContainer;
                    prevBtn.style.opacity = scrollLeft <= 2 ? "0.3" : "1";
                    prevBtn.style.pointerEvents = scrollLeft <= 2 ? "none" : "auto";

                    const isAtEnd = scrollLeft + clientWidth >= scrollWidth - 2;
                    nextBtn.style.opacity = isAtEnd ? "0.3" : "1";
                    nextBtn.style.pointerEvents = isAtEnd ? "none" : "auto";
                };

                scrollContainer.addEventListener("scroll", updateArrows);
                window.addEventListener("resize", updateArrows);

                // Ejecutar tras un pequeño delay para asegurar renderizado
                setTimeout(updateArrows, 100);
            }
        });
    </script>

    <script src="js/layout.js"></script>

</body>

</html>
