<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - EcoIsla Market</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="header-placeholder"></div>

<div class="central-container">
    <!-- tu contenido perfil -->
</div>

<div id="footer-placeholder"></div>

<script>
    function loadComponent(url, elementId) {
        return fetch(url)
            .then(res => {
                if (!res.ok) throw new Error("Error cargando " + url);
                return res.text();
            })
            .then(html => {
                document.getElementById(elementId).innerHTML = html;
            });
    }

    function setActiveNavLink() {
        const file = window.location.pathname.split('/').pop();

        const pageMap = {
            'index.html': 'index',
            'catalogo.html': 'catalogo',
            'productores.html': 'productores',
            'contacto.html': 'contacto',
            'perfil.html': 'perfil'
        };

        const current = pageMap[file];

        document.querySelectorAll('.nav-link').forEach(a => {
            a.classList.toggle('active', a.dataset.page === current);
        });
    }

    document.addEventListener("DOMContentLoaded", async () => {
        await loadComponent('/templates/header.html', 'header-placeholder');
        await loadComponent('/templates/footer.html', 'footer-placeholder');
        setActiveNavLink();
    });
</script>

</body>
</html>
